<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Table | Brew & Beyond</title>
    <link rel="stylesheet" href="booktable.css">

</head>

<body>

<header>
    <nav class="navbar">
        <div class="logo">☕ Brew & Beyond</div>
        
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="events.html">Events</a></li>
        </ul>
    </nav>
</header>


<section class="booking">
    
    <h1>Reserve Your Table</h1>
    
    <div class="form-box">
        
        <form onsubmit="reserveTable(); return false;">
            <div class="input-box">
                <input type="text" placeholder="Full Name" required>
            </div>
            
            <div class="input-box">
                <input type="email" placeholder="Email Address" required>
            </div>
            
            <div class="input-box">
                <input type="number" placeholder="Phone Number" required>
            </div>
            
            <div class="input-box">
                <input type="number" placeholder="Number Of Guests" required>
            </div>
            
            <div class="input-box">
                <input type="date" required>
            </div>
            
            <div class="input-box">
                <input type="time" required>
            </div>
            
            <div class="input-box">
                <textarea placeholder="Special Request"></textarea>
            </div>
            
            <button>Reserve Table</button>
        
        </form>
    
    </div>

</section>

<script src="booktable.js"></script>

</body>
</html>
